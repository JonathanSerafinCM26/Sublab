services:
  backend:
    image: sublab-backend:latest
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - ENV=production
      - DATABASE_URL=${DATABASE_URL:-postgresql://sublab:sublab@db:5432/sublab}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - FISH_AUDIO_API_KEY=${FISH_AUDIO_API_KEY}
    ports:
      - "127.0.0.1:${SUBLAB_BACKEND_PORT:-8580}:8000"
    volumes:
      - ./audio_cache:/app/audio_cache
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    image: sublab-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${SUBLAB_FRONTEND_PORT:-5180}:80"
    depends_on:
      backend:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sublab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sublab}
      POSTGRES_DB: ${POSTGRES_DB:-sublab}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

volumes:
  postgres_data:
